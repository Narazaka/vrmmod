name: Build

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - run: ./gradlew build

      - uses: actions/upload-artifact@v4
        with:
          name: mod-jars
          path: |
            fabric/build/libs/*.jar
            neoforge/build/libs/*.jar
          if-no-files-found: error

      - name: Upload to Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.sha }}
          name: Build ${{ github.sha }}
          prerelease: true
          files: |
            fabric/build/libs/!(*-@(sources|dev)).jar
            neoforge/build/libs/!(*-@(sources|dev)).jar

      - name: Clean up old build releases
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release list --limit 100 --json tagName,isPrerelease \
            --jq '[.[] | select(.isPrerelease and (.tagName | startswith("build-")))] | sort_by(.tagName) | reverse | .[5:] | .[].tagName' \
          | while read -r tag; do
              gh release delete "$tag" --yes --cleanup-tag
            done
