name: Build

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            17
            21

      - uses: gradle/actions/setup-gradle@v4

      - run: ./gradlew chiseledBuild -x test
        env:
          VROIDHUB_CLIENT_ID: ${{ secrets.VROIDHUB_CLIENT_ID }}
          VROIDHUB_CLIENT_SECRET: ${{ secrets.VROIDHUB_CLIENT_SECRET }}

      # Collect only the final remapped JARs (exclude -dev-shadow intermediate artifacts)
      - run: |
          mkdir -p build/release-jars
          find versions/*/build/libs/ -name "*.jar" ! -name "*-dev-shadow*" -exec cp {} build/release-jars/ \;

      - uses: actions/upload-artifact@v4
        with:
          name: mod-jars
          path: build/release-jars/*.jar
          if-no-files-found: error

      - name: Set build timestamp
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: echo "BUILD_TIME=$(date -u +'%Y%m%d-%H%M%S')" >> "$GITHUB_ENV"

      - name: Upload to Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ env.BUILD_TIME }}-${{ github.sha }}
          name: Build ${{ env.BUILD_TIME }} (${{ github.sha }})
          prerelease: true
          files: build/release-jars/*.jar

      - name: Clean up old build releases
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release list --limit 100 --json tagName,isPrerelease,createdAt \
            --jq '[.[] | select(.isPrerelease and (.tagName | startswith("build-")))] | sort_by(.createdAt) | reverse | .[5:] | .[].tagName' \
          | while read -r tag; do
              gh release delete "$tag" --yes --cleanup-tag
            done

  publish:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            17
            21

      - uses: gradle/actions/setup-gradle@v4

      - name: Build all variants
        run: ./gradlew chiseledBuild -x test
        env:
          VROIDHUB_CLIENT_ID: ${{ secrets.VROIDHUB_CLIENT_ID }}
          VROIDHUB_CLIENT_SECRET: ${{ secrets.VROIDHUB_CLIENT_SECRET }}

      - name: Collect JARs
        run: |
          mkdir -p build/release-jars
          find versions/*/build/libs/ -name "*.jar" ! -name "*-dev-shadow*" -exec cp {} build/release-jars/ \;

      - name: Publish to Modrinth + CurseForge
        run: ./gradlew chiseledPublishMods
        env:
          DO_PUBLISH: false  # Stonecraft bug: false=publish, true=dryRun (opposite of docs)
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_ID: ${{ vars.MODRINTH_ID }}
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
          CURSEFORGE_ID: ${{ vars.CURSEFORGE_ID }}
          CURSEFORGE_SLUG: ${{ vars.CURSEFORGE_SLUG }}
          VROIDHUB_CLIENT_ID: ${{ secrets.VROIDHUB_CLIENT_ID }}
          VROIDHUB_CLIENT_SECRET: ${{ secrets.VROIDHUB_CLIENT_SECRET }}

      - name: Set Modrinth environment for published versions (v3 API)
        run: |
          VERSION_IDS=$(curl -sf "https://api.modrinth.com/v3/project/$MODRINTH_ID/version" \
            -H "Authorization: $MODRINTH_TOKEN" | jq -r '.[].id')
          for VID in $VERSION_IDS; do
            echo "Setting environment for version $VID"
            curl -sf -X PATCH "https://api.modrinth.com/v3/version/$VID" \
              -H "Authorization: $MODRINTH_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"environment":"client_only_server_optional"}'
          done
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_ID: ${{ vars.MODRINTH_ID }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: build/release-jars/*.jar
