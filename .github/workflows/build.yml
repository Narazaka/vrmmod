name: Build

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            17
            21

      - uses: gradle/actions/setup-gradle@v4

      - run: ./gradlew chiseledBuild -x test
        env:
          VROIDHUB_CLIENT_ID: ${{ secrets.VROIDHUB_CLIENT_ID }}
          VROIDHUB_CLIENT_SECRET: ${{ secrets.VROIDHUB_CLIENT_SECRET }}

      # Collect only the final remapped JARs (exclude -dev-shadow intermediate artifacts)
      - run: |
          mkdir -p build/release-jars
          find versions/*/build/libs/ -name "*.jar" ! -name "*-dev-shadow*" -exec cp {} build/release-jars/ \;

      - uses: actions/upload-artifact@v4
        with:
          name: mod-jars
          path: build/release-jars/*.jar
          if-no-files-found: error

      - name: Set build timestamp
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: echo "BUILD_TIME=$(date -u +'%Y%m%d-%H%M%S')" >> "$GITHUB_ENV"

      - name: Upload to Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ env.BUILD_TIME }}-${{ github.sha }}
          name: Build ${{ env.BUILD_TIME }} (${{ github.sha }})
          prerelease: true
          files: build/release-jars/*.jar

      - name: Clean up old build releases
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release list --limit 100 --json tagName,isPrerelease,createdAt \
            --jq '[.[] | select(.isPrerelease and (.tagName | startswith("build-")))] | sort_by(.createdAt) | reverse | .[5:] | .[].tagName' \
          | while read -r tag; do
              gh release delete "$tag" --yes --cleanup-tag
            done

  publish:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            17
            21

      - uses: gradle/actions/setup-gradle@v4

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "MOD_VERSION=$VERSION" >> "$GITHUB_ENV"
          sed -i "s/mod.version=.*/mod.version=$VERSION/" gradle.properties

      - name: Build all variants
        run: ./gradlew chiseledBuild -x test
        env:
          VROIDHUB_CLIENT_ID: ${{ secrets.VROIDHUB_CLIENT_ID }}
          VROIDHUB_CLIENT_SECRET: ${{ secrets.VROIDHUB_CLIENT_SECRET }}

      - name: Collect JARs
        run: |
          mkdir -p build/release-jars
          find versions/*/build/libs/ -name "*.jar" ! -name "*-dev-shadow*" -exec cp {} build/release-jars/ \;

      - name: Publish to Modrinth + CurseForge
        run: ./gradlew chiseledPublishMods
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_ID: ${{ secrets.MODRINTH_ID }}
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
          CURSEFORGE_ID: ${{ secrets.CURSEFORGE_ID }}
          VROIDHUB_CLIENT_ID: ${{ secrets.VROIDHUB_CLIENT_ID }}
          VROIDHUB_CLIENT_SECRET: ${{ secrets.VROIDHUB_CLIENT_SECRET }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ env.MOD_VERSION }}
          files: build/release-jars/*.jar
